# 识墨文坊 · Nginx 站点配置（Ubuntu 生产环境）
# 安装：sudo cp deploy/nginx.doc-intel.conf /etc/nginx/sites-available/doc-intel
#       sudo ln -sf /etc/nginx/sites-available/doc-intel /etc/nginx/sites-enabled/
#       sudo rm -f /etc/nginx/sites-enabled/default
#       sudo nginx -t && sudo systemctl reload nginx
#
# 若前端 build 输出在 /var/www/doc-intel，将 root 改为该路径。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /home/azureuser/Document-Intelligence-System/extended-frontend/dist;
    index index.html;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
